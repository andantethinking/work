<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.slice.css" rel="stylesheet">
  <style>
    body { padding: 30px; background-color: #f8f9fa; font-family: 'Malgun Gothic', sans-serif; }
    .container { max-width: 1200px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .header-title { font-weight: 700; color: #1e293b; margin-bottom: 25px; }
    .card-task { border: 1px solid #e2e8f0; border-radius: 8px; padding: 20px; margin-bottom: 20px; background-color: #ffffff; }
    .project-title { font-weight: 600; color: #2563eb; }
    .meta-info { font-size: 0.9rem; color: #64748b; margin-bottom: 10px; }
    .label-custom { font-weight: 600; margin-bottom: 5px; color: #475569; display: block; }
  </style>
</head>
<body>

<div class="container">
  <h2 class="header-title">📝 주간 업무보고 입력 웹앱</h2>
  
  <div class="row align-items-end mb-4">
    <div class="col-md-4">
      <label class="label-custom">사원명 조회</label>
      <input type="text" id="employeeName" class="form-control" placeholder="이름을 입력하세요 (예: 박종현)">
    </div>
    <div class="col-md-2">
      <button class="btn btn-primary w-100" onclick="loadTasks()">내 업무 불러오기</button>
    </div>
  </div>

  <hr>

  <div id="taskList" class="mt-4">
    <p class="text-muted text-center">사원명을 입력하고 버튼을 누르면 담당 프로젝트 목록이 나타납니다.</p>
  </div>
</div>

<script>
  // 백엔드로부터 업무 리스트를 가져와 화면에 그리는 함수
  function loadTasks() {
    const name = document.getElementById('employeeName').value.trim();
    if (!name) { alert('이름을 입력해주세요.'); return; }
    
    document.getElementById('taskList').innerHTML = '<div class="text-center"><div class="spinner-border text-primary" role="status"></div></div>';
    
    google.script.run
      .withSuccessHandler(renderTasks)
      .withFailureHandler(function(err) { alert('오류 발생: ' + err); })
      .getTasksByEmployee(name);
  }

  function renderTasks(tasks) {
    const container = document.getElementById('taskList');
    if (tasks.length === 0) {
      container.innerHTML = '<p class="text-danger text-center">해당 사원이 담당자로 지정된 사업이 없습니다.</p>';
      return;
    }
    
    let html = '';
    tasks.forEach(task => {
      html += `
        <div class="card-task" id="row-${task.rowNumber}">
          <div class="row">
            <div class="col-md-8">
              <span class="badge bg-secondary mb-2">${task.division || '구분 없음'}</span>
              <h4 class="project-title">${task.projectName}</h4>
              <div class="meta-info">
                <strong>고객사:</strong> ${task.client} | <strong>기간:</strong> ${task.period} | <strong>매출:</strong> ${task.sales}
              </div>
              <div class="p-2 bg-light rounded mb-3" style="font-size:0.95rem;">
                <strong>💡 전주 진행 내용:</strong><br>${task.lastWeek ? task.lastWeek.replace(/\n/g, '<br>') : '없음'}
              </div>
            </div>
            
            <div class="col-md-4 border-start">
              <div class="mb-3">
                <label class="label-custom">진행 단계</label>
                <select id="stage-${task.rowNumber}" class="form-select">
                  <option value="제안" ${task.stage === '제안' ? 'selected' : ''}>제안</option>
                  <option value="수행" ${task.stage === '수행' ? 'selected' : ''}>수행</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="label-custom">금주 진행 내용</label>
                <textarea id="thisWeek-${task.rowNumber}" class="form-control" rows="3">${task.thisWeek || ''}</textarea>
              </div>
              <button class="btn btn-success btn-sm w-100" onclick="saveTask(${task.rowNumber})">💾 이 항목 저장</button>
            </div>
          </div>
        </div>
      `;
    });
    container.innerHTML = html;
  }

  // 변경된 데이터를 백엔드로 전송하여 시트에 실시간 저장하는 함수
  function saveTask(rowNumber) {
    const stage = document.getElementById(`stage-${rowNumber}`).value;
    const thisWeek = document.getElementById(`thisWeek-${rowNumber}`).value;
    
    google.script.run
      .withSuccessHandler(function(response) {
        if(response.success) {
          alert('시트에 성공적으로 반영되었습니다.');
        } else {
          alert('저장 실패: ' + response.message);
        }
      })
      .updateTaskRow(rowNumber, stage, thisWeek);
  }
</script>
</body>
</html>
