<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주간 업무 보고</title>
<style>
  :root{
    --navy-900:#0b1830;
    --navy-800:#122142;
    --navy-700:#1b2d55;
    --navy-600:#2a3d6b;
    --line:#26365c;
    --text:#e7ebf5;
    --text-dim:#8f9bc0;
    --accent:#4f7fff;
    --accent-soft:#1d2c52;
    --good:#3ecf8e;
    --warn:#e8a33d;
    --danger:#e05a5a;
    --radius:10px;
    font-family:-apple-system,"Pretendard","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--navy-900); color:var(--text);
    min-height:100vh;
  }
  header{
    background:var(--navy-800); border-bottom:1px solid var(--line);
    padding:16px 24px; display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:10;
  }
  header h1{ font-size:16px; font-weight:600; margin:0; letter-spacing:.2px; }
  header .week{ font-size:12px; color:var(--text-dim); }
  nav{ display:flex; gap:4px; padding:0 24px; background:var(--navy-800); border-bottom:1px solid var(--line); }
  nav button{
    background:none; border:none; color:var(--text-dim); padding:12px 16px; font-size:13px;
    cursor:pointer; border-bottom:2px solid transparent; font-weight:500;
  }
  nav button.active{ color:var(--text); border-bottom-color:var(--accent); }
  main{ padding:20px 24px 80px; max-width:1100px; margin:0 auto; }

  .toolbar{ display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
  select, input[type=text]{
    background:var(--navy-700); border:1px solid var(--line); color:var(--text);
    padding:9px 12px; border-radius:var(--radius); font-size:13px; outline:none;
  }
  select:focus, input:focus{ border-color:var(--accent); }
  button.primary{
    background:var(--accent); color:#fff; border:none; padding:9px 16px;
    border-radius:var(--radius); font-size:13px; font-weight:600; cursor:pointer;
  }
  button.ghost{
    background:transparent; border:1px solid var(--line); color:var(--text);
    padding:9px 14px; border-radius:var(--radius); font-size:13px; cursor:pointer;
  }

  .card{
    background:var(--navy-800); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px; margin-bottom:12px;
  }
  .card-head{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
  .card-head .proj{ font-size:14px; font-weight:600; }
  .card-head .client{ font-size:12px; color:var(--text-dim); }
  .tag{
    display:inline-block; font-size:11px; padding:2px 8px; border-radius:20px;
    background:var(--accent-soft); color:var(--accent); margin-left:8px;
  }
  .field-label{ font-size:11px; color:var(--text-dim); margin:10px 0 4px; }
  textarea{
    width:100%; background:var(--navy-700); border:1px solid var(--line); color:var(--text);
    border-radius:8px; padding:8px 10px; font-size:13px; resize:vertical; min-height:44px;
    font-family:inherit;
  }
  textarea[readonly]{ opacity:.7; }
  .row{ display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
  .row .col{ flex:1; min-width:120px; }
  .days{ display:flex; gap:6px; margin-top:10px; }
  .day-chip{
    width:34px; height:34px; border-radius:8px; border:1px solid var(--line);
    background:var(--navy-700); color:var(--text-dim); font-size:12px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .day-chip.on{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .card-foot{ display:flex; justify-content:flex-end; margin-top:12px; gap:8px; }
  .saved-tag{ font-size:11px; color:var(--good); align-self:center; opacity:0; transition:opacity .3s; }
  .saved-tag.show{ opacity:1; }

  .dept-group{ margin-bottom:24px; }
  .dept-title{
    font-size:13px; font-weight:700; color:var(--text-dim); text-transform:uppercase;
    letter-spacing:.5px; margin-bottom:8px; padding-bottom:6px; border-bottom:1px solid var(--line);
  }
  table{ width:100%; border-collapse:collapse; font-size:12.5px; }
  th{ text-align:left; color:var(--text-dim); font-weight:500; padding:8px 10px; border-bottom:1px solid var(--line); }
  td{ padding:8px 10px; border-bottom:1px solid rgba(255,255,255,.04); vertical-align:top; }
  tr:hover td{ background:rgba(255,255,255,.02); }
  .progress-bar{ width:60px; height:6px; background:var(--navy-700); border-radius:4px; overflow:hidden; display:inline-block; vertical-align:middle; margin-left:6px; }
  .progress-fill{ height:100%; background:var(--accent); }

  .empty{ text-align:center; color:var(--text-dim); font-size:13px; padding:60px 0; }
  .modal-bg{
    position:fixed; inset:0; background:rgba(0,0,0,.5); display:flex; align-items:center;
    justify-content:center; z-index:100;
  }
  .modal{
    background:var(--navy-800); border:1px solid var(--line); border-radius:var(--radius);
    padding:20px; width:360px; max-width:90vw;
  }
  .modal h3{ margin:0 0 14px; font-size:14px; }
  .modal .field-label{ margin-top:12px; }
  .modal .actions{ display:flex; justify-content:flex-end; gap:8px; margin-top:18px; }
  .hidden{ display:none; }
</style>
</head>
<body>

<header>
  <h1>K-Brain 주간 업무 보고</h1>
  <span class="week" id="weekLabel">주차 불러오는 중...</span>
</header>

<nav>
  <button class="active" data-view="input">내 업무 입력</button>
  <button data-view="dashboard">전체 현황</button>
</nav>

<main>
  <!-- ===== 입력 화면 ===== -->
  <section id="view-input">
    <div class="toolbar">
      <select id="nameSelect">
        <option value="">담당자를 선택하세요</option>
      </select>
      <button class="ghost" id="addTaskBtn">+ 신규 사업 추가</button>
    </div>
    <div id="taskList"></div>
  </section>

  <!-- ===== 대시보드 화면 ===== -->
  <section id="view-dashboard" class="hidden">
    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="이름, 고객사, 사업명 검색">
    </div>
    <div id="dashboardBody"></div>
  </section>
</main>

<!-- 신규 사업 추가 모달 -->
<div class="modal-bg hidden" id="addModal">
  <div class="modal">
    <h3>신규 사업 추가</h3>
    <div class="field-label">고객사</div>
    <input type="text" id="newClient" style="width:100%">
    <div class="field-label">사업명</div>
    <input type="text" id="newProject" style="width:100%">
    <div class="field-label">역할</div>
    <select id="newRole" style="width:100%">
      <option>수행</option><option>제안</option><option>PM</option>
      <option>수행지원</option><option>일일보고</option><option>기타</option>
    </select>
    <div class="field-label">금주 추진목표</div>
    <textarea id="newGoal"></textarea>
    <div class="actions">
      <button class="ghost" id="cancelAdd">취소</button>
      <button class="primary" id="confirmAdd">추가</button>
    </div>
  </div>
</div>

<script>
// ⚠️ 여기에 Apps Script 배포 후 나오는 웹앱 URL을 입력하세요
const API_URL = 'https://script.google.com/macros/s/AKfycby8takxFeL6fQ0ezHcu_x7M61WWn82D8cXYQI4TX2HP3gLcoUK-OJjY8hw__7rHvUIlJw/exec';

let personalData = [];
let teamData = [];
let currentWeek = '';

async function apiGet(action){
  const res = await fetch(`${API_URL}?action=${action}`);
  return res.json();
}
async function apiPost(payload){
  const res = await fetch(API_URL, { method:'POST', body: JSON.stringify(payload) });
  return res.json();
}

async function loadAll(){
  document.getElementById('taskList').innerHTML = '<div class="empty">불러오는 중...</div>';
  try{
    const data = await apiGet('getAll');
    if(!data.ok) throw new Error(data.error);
    personalData = data.personal;
    teamData = data.team;
    currentWeek = data.week;
    document.getElementById('weekLabel').textContent = currentWeek;
    populateNameSelect();
    renderDashboard();
  }catch(err){
    document.getElementById('taskList').innerHTML =
      `<div class="empty">데이터를 불러오지 못했습니다.<br>${err.message}<br>API_URL 설정을 확인하세요.</div>`;
  }
}

function populateNameSelect(){
  const names = [...new Set(personalData.map(r => r.name).filter(Boolean))].sort();
  const sel = document.getElementById('nameSelect');
  sel.innerHTML = '<option value="">담당자를 선택하세요</option>' +
    names.map(n => `<option value="${n}">${n}</option>`).join('');
}

function renderTaskList(){
  const name = document.getElementById('nameSelect').value;
  const listEl = document.getElementById('taskList');
  if(!name){ listEl.innerHTML = '<div class="empty">담당자를 선택하면 내 업무 목록이 표시됩니다.</div>'; return; }

  const mine = personalData.filter(r => r.name === name);
  if(mine.length === 0){ listEl.innerHTML = '<div class="empty">등록된 업무가 없습니다. 신규 사업을 추가해보세요.</div>'; return; }

  listEl.innerHTML = mine.map(task => renderCard(task)).join('');
  mine.forEach(task => bindCard(task));
}

function renderCard(t){
  return `
  <div class="card" data-row="${t.rowNum}">
    <div class="card-head">
      <div><span class="proj">${t.project||'(사업명 없음)'}</span><span class="tag">${t.role||'-'}</span></div>
      <div class="client">${t.client||''}</div>
    </div>

    <div class="field-label">금주 추진목표</div>
    <textarea class="f-goal">${t.goal||''}</textarea>

    <div class="field-label">금주 추진결과</div>
    <textarea class="f-result" placeholder="이번 주 실제 진행한 내용을 입력하세요">${t.result||''}</textarea>

    <div class="row">
      <div class="col">
        <div class="field-label">누적진행률(%)</div>
        <input type="text" class="f-progress" value="${t.progress||''}">
      </div>
      <div class="col">
        <div class="field-label">업무난이도</div>
        <select class="f-difficulty">
          <option ${t.difficulty==='상'?'selected':''}>상</option>
          <option ${t.difficulty==='중'?'selected':''}>중</option>
          <option ${t.difficulty==='하'?'selected':''}>하</option>
        </select>
      </div>
      <div class="col">
        <div class="field-label">업무종료일</div>
        <input type="text" class="f-taskend" value="${t.taskEnd||''}">
      </div>
    </div>

    <div class="field-label">업무 요일</div>
    <div class="days">
      ${['mon','tue','wed','thu','fri'].map((d,i)=>{
        const label = ['월','화','수','목','금'][i];
        const on = t.days && t.days[d];
        return `<div class="day-chip ${on?'on':''}" data-day="${d}">${label}</div>`;
      }).join('')}
    </div>

    <div class="card-foot">
      <span class="saved-tag">저장됨</span>
      <button class="primary save-btn">저장</button>
    </div>
  </div>`;
}

function bindCard(t){
  const card = document.querySelector(`.card[data-row="${t.rowNum}"]`);
  if(!card) return;

  card.querySelectorAll('.day-chip').forEach(chip=>{
    chip.addEventListener('click', ()=> chip.classList.toggle('on'));
  });

  card.querySelector('.save-btn').addEventListener('click', async ()=>{
    const days = {};
    card.querySelectorAll('.day-chip').forEach(chip=>{ days[chip.dataset.day] = chip.classList.contains('on'); });

    const payload = {
      action: 'updatePersonalRow',
      rowNum: t.rowNum,
      goal: card.querySelector('.f-goal').value,
      result: card.querySelector('.f-result').value,
      progress: card.querySelector('.f-progress').value,
      difficulty: card.querySelector('.f-difficulty').value,
      taskEnd: card.querySelector('.f-taskend').value,
      days
    };
    const btn = card.querySelector('.save-btn');
    btn.textContent = '저장 중...'; btn.disabled = true;
    const res = await apiPost(payload);
    btn.textContent = '저장'; btn.disabled = false;
    if(res.ok){
      const tag = card.querySelector('.saved-tag');
      tag.classList.add('show');
      setTimeout(()=>tag.classList.remove('show'), 1500);
    }else{
      alert('저장 실패: ' + res.error);
    }
  });
}

function renderDashboard(){
  const q = (document.getElementById('searchInput').value||'').toLowerCase();
  const filtered = personalData.filter(r =>
    !q || (r.name+r.client+r.project).toLowerCase().includes(q));

  const byDept = {};
  filtered.forEach(r=>{
    const d = r.dept || '미분류';
    (byDept[d] = byDept[d]||[]).push(r);
  });

  const el = document.getElementById('dashboardBody');
  if(Object.keys(byDept).length===0){ el.innerHTML = '<div class="empty">표시할 데이터가 없습니다.</div>'; return; }

  el.innerHTML = Object.entries(byDept).map(([dept, rows])=>`
    <div class="dept-group">
      <div class="dept-title">${dept}</div>
      <table>
        <thead><tr>
          <th>성명</th><th>고객사</th><th>사업명</th><th>역할</th>
          <th>금주 추진결과</th><th>진행률</th><th>종료일</th>
        </tr></thead>
        <tbody>
          ${rows.map(r=>`
            <tr>
              <td>${r.name}</td>
              <td>${r.client||''}</td>
              <td>${r.project||''}</td>
              <td>${r.role||''}</td>
              <td>${r.result||'<span style="color:var(--text-dim)">-</span>'}</td>
              <td>${r.progress||''}<span class="progress-bar"><span class="progress-fill" style="width:${parseInt(r.progress)||0}%"></span></span></td>
              <td>${r.taskEnd||''}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
  `).join('');
}

// ===== 네비게이션 =====
document.querySelectorAll('nav button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const view = btn.dataset.view;
    document.getElementById('view-input').classList.toggle('hidden', view!=='input');
    document.getElementById('view-dashboard').classList.toggle('hidden', view!=='dashboard');
  });
});

document.getElementById('nameSelect').addEventListener('change', renderTaskList);
document.getElementById('searchInput').addEventListener('input', renderDashboard);

// ===== 신규 사업 추가 모달 =====
document.getElementById('addTaskBtn').addEventListener('click', ()=>{
  if(!document.getElementById('nameSelect').value){ alert('먼저 담당자를 선택하세요'); return; }
  document.getElementById('addModal').classList.remove('hidden');
});
document.getElementById('cancelAdd').addEventListener('click', ()=>{
  document.getElementById('addModal').classList.add('hidden');
});
document.getElementById('confirmAdd').addEventListener('click', async ()=>{
  const name = document.getElementById('nameSelect').value;
  const dept = (personalData.find(r=>r.name===name)||{}).dept || '';
  const payload = {
    action:'addPersonalRow',
    dept, name,
    client: document.getElementById('newClient').value,
    project: document.getElementById('newProject').value,
    role: document.getElementById('newRole').value,
    goal: document.getElementById('newGoal').value
  };
  const res = await apiPost(payload);
  if(res.ok){
    document.getElementById('addModal').classList.add('hidden');
    await loadAll();
    document.getElementById('nameSelect').value = name;
    renderTaskList();
  }else{
    alert('추가 실패: ' + res.error);
  }
});

loadAll();
</script>
</body>
</html>
