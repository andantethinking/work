<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팀별 주간 업무 현황 입력</title>
<style>
  :root{
    --purple:#7132F5; --purple-dark:#5824C4; --purple-tint:#F2ECFE;
    --ink:#1D1B23; --sub:#6B6875; --line:#E4E1EC; --bg:#FAF9FC; --card:#FFFFFF;
    --danger:#D8453A;
    --amber:#B8790F; --amber-tint:#FCF1DD;
    --teal:#0F6E56; --teal-tint:#E2F3EE;
    --blue:#1D5FA5; --blue-tint:#E7F1FB;
    --green:#2F7A34; --green-tint:#E8F4E6;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--ink);}
  .wrap{max-width:1000px;margin:0 auto;padding:28px 20px 90px;}
  .icon{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;vertical-align:-3px;}
  .hidden{display:none !important;}

  /* ---- 공통 헤더 ---- */
  header{display:flex;align-items:center;gap:14px;margin-bottom:20px;}
  .logo{width:44px;height:44px;border-radius:12px;background:var(--purple);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .logo svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:1.8;}
  header h1{font-size:19px;font-weight:700;margin:0 0 2px;}
  header p{font-size:13px;color:var(--sub);margin:0;}

  /* ---- STEP 1: 팀 선택 ---- */
  .team-pick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .team-pick-card{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:24px 16px;text-align:center;cursor:pointer;transition:border-color .12s, transform .12s;}
  .team-pick-card:hover{border-color:var(--purple);transform:translateY(-2px);}
  .team-pick-card .icon-wrap{width:48px;height:48px;border-radius:12px;background:var(--purple-tint);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
  .team-pick-card .icon-wrap svg{width:24px;height:24px;stroke:var(--purple-dark);fill:none;stroke-width:1.8;}
  .team-pick-card .t-name{font-weight:700;font-size:14px;}

  /* ---- STEP 2: 입력 화면 ---- */
  .team-banner{display:flex;align-items:center;justify-content:space-between;background:var(--purple-tint);border-radius:14px;padding:14px 18px;margin-bottom:18px;}
  .team-banner .t-name{font-weight:700;font-size:15px;color:var(--purple-dark);}
  .change-team-btn{background:none;border:none;color:var(--purple-dark);font-size:12px;font-weight:600;cursor:pointer;text-decoration:underline;}

  .week-nav{display:flex;align-items:center;justify-content:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 18px;margin-bottom:14px;}
  .week-nav button{background:var(--purple-tint);border:none;width:32px;height:32px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--purple-dark);flex-shrink:0;}
  .week-nav button:hover{background:#E9DFFD;}
  .week-nav .label{text-align:center;}
  .week-nav .label .main{font-weight:700;font-size:15px;}
  .week-nav .label .sub{font-size:12px;color:var(--sub);}

  .action-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px;}
  .ghost-btn{display:flex;align-items:center;gap:6px;padding:9px 14px;border-radius:9px;border:1px solid var(--line);background:#fff;color:var(--ink);font-size:13px;font-weight:600;cursor:pointer;}
  .ghost-btn:hover{border-color:var(--purple);color:var(--purple-dark);}
  .ghost-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;}
  .summary-chip{margin-left:auto;display:flex;gap:18px;}
  .summary-chip .item{text-align:right;}
  .summary-chip .num{font-size:18px;font-weight:700;color:var(--purple-dark);}
  .summary-chip .lbl{font-size:11px;color:var(--sub);}

  .row-card{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:14px;overflow:hidden;}
  .row-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--line);}
  .row-head input[data-field=client]{font-size:15px;font-weight:700;border:none;padding:2px 0;background:transparent;width:220px;}
  .row-head input[data-field=client]:focus{outline:none;border-bottom:1.5px solid var(--purple);}
  .continued-tag{font-size:10px;font-weight:700;color:var(--teal);background:var(--teal-tint);padding:2px 8px;border-radius:999px;margin-left:8px;}
  .remove-btn{background:none;border:none;color:var(--sub);cursor:pointer;display:flex;align-items:center;}
  .remove-btn:hover{color:var(--danger);}

  .stage-group{display:flex;gap:6px;padding:12px 16px 0;flex-wrap:wrap;}
  .stage-btn{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:7px 13px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--sub);cursor:pointer;}
  .stage-btn.active[data-stage="제안"]{background:var(--amber-tint);color:var(--amber);border-color:var(--amber-tint);}
  .stage-btn.active[data-stage="수행"]{background:var(--teal-tint);color:var(--teal);border-color:var(--teal-tint);}
  .stage-btn.active[data-stage="제안/수행"]{background:var(--purple-tint);color:var(--purple-dark);border-color:var(--purple-tint);}
  .stage-btn.active[data-stage="수행/정산"]{background:var(--blue-tint);color:var(--blue);border-color:var(--blue-tint);}
  .stage-btn.active[data-stage="계약"]{background:var(--green-tint);color:var(--green);border-color:var(--green-tint);}

  .row-body{padding:14px 16px 16px;}
  .field{display:flex;flex-direction:column;gap:5px;}
  .field label{font-size:12px;color:var(--sub);font-weight:600;display:flex;align-items:center;gap:4px;}
  select,input[type=text],input[type=date],textarea{
    font-family:inherit;font-size:14px;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);width:100%;
  }
  select:focus,input:focus,textarea:focus{outline:none;border-color:var(--purple);box-shadow:0 0 0 3px var(--purple-tint);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  textarea{min-height:60px;resize:vertical;}

  .owner-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
  .owner-chip{font-size:11px;padding:4px 10px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--sub);cursor:pointer;}
  .owner-chip:hover,.owner-chip.selected{border-color:var(--purple);color:var(--purple-dark);background:var(--purple-tint);}

  .period-toggle{font-size:11px;color:var(--purple-dark);cursor:pointer;text-decoration:underline;margin-left:auto;font-weight:600;}
  .field-head{display:flex;align-items:center;}
  .period-range{display:grid;grid-template-columns:1fr auto 1fr;gap:6px;align-items:center;}
  .period-range .sep{font-size:12px;color:var(--sub);text-align:center;}

  .add-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:6px;padding:13px;border:1.5px dashed var(--purple);border-radius:12px;background:var(--purple-tint);color:var(--purple-dark);font-weight:700;font-size:14px;cursor:pointer;margin-bottom:26px;}
  .add-btn:hover{background:#E9DFFD;}
  .add-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;}

  .submit-bar{position:sticky;bottom:0;background:linear-gradient(180deg,rgba(250,249,252,0),var(--bg) 30%);padding:16px 0 0;}
  .submit-btn{width:100%;padding:14px;border:none;border-radius:12px;background:var(--purple);color:#fff;font-weight:700;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
  .submit-btn svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2;}
  .submit-btn:hover{background:var(--purple-dark);}
  .submit-btn:disabled{background:var(--line);color:var(--sub);cursor:default;}
  .status{font-size:13px;text-align:center;margin-top:10px;color:var(--sub);}
  .status.ok{color:#1D8A4A;}
  .status.err{color:var(--danger);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo"><svg viewBox="0 0 24 24"><path d="M4 4h16v16H4z" rx="2"/><path d="M8 9h8M8 13h8M8 17h5"/></svg></div>
    <div>
      <h1>팀별 주간 업무 현황 입력</h1>
      <p>고객사별로 전주 실적과 금주 계획을 입력해 주세요.</p>
    </div>
  </header>

  <!-- STEP 1 -->
  <div id="step1">
    <div class="team-pick-grid" id="teamGrid"></div>
  </div>

  <!-- STEP 2 -->
  <div id="step2" class="hidden">
    <div class="team-banner">
      <span class="t-name" id="bannerTeam"></span>
      <button class="change-team-btn" id="changeTeamBtn" type="button">팀 다시 선택</button>
    </div>

    <div class="week-nav">
      <button type="button" id="prevWeek"><svg class="icon" viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg></button>
      <div class="label"><div class="main" id="weekMain"></div><div class="sub" id="weekSub"></div></div>
      <button type="button" id="nextWeek"><svg class="icon" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></button>
    </div>

    <div class="action-bar">
      <button class="ghost-btn" id="loadPrevBtn" type="button">
        <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 109-9M3 12l4-4M3 12l4 4"/></svg>
        지난주 내용 불러오기
      </button>
      <div class="summary-chip">
        <div class="item"><div class="num" id="sumCount">0</div><div class="lbl">항목</div></div>
        <div class="item"><div class="num" id="sumRevenue">0</div><div class="lbl">합계 매출(만원)</div></div>
      </div>
    </div>

    <div id="rows"></div>
    <button class="add-btn" id="addRow" type="button">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      고객사 항목 추가
    </button>

    <div class="submit-bar">
      <button class="submit-btn" id="submitBtn" type="button">
        <svg viewBox="0 0 24 24"><path d="M4 12l6 6L20 6"/></svg>
        제출하기
      </button>
      <div class="status" id="status"></div>
    </div>
  </div>
</div>

<template id="rowTemplate">
  <div class="row-card">
    <div class="row-head">
      <div style="display:flex;align-items:center;">
        <input type="text" data-field="client" placeholder="고객사명 입력">
        <span class="continued-tag hidden" data-el="continuedTag">이어쓰기</span>
      </div>
      <button class="remove-btn" type="button" data-action="remove">
        <svg class="icon" style="width:18px;height:18px" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>
    <div class="stage-group" data-field="stageGroup">
      <button type="button" class="stage-btn" data-stage="제안">제안</button>
      <button type="button" class="stage-btn" data-stage="수행">수행</button>
      <button type="button" class="stage-btn" data-stage="제안/수행">제안/수행</button>
      <button type="button" class="stage-btn" data-stage="수행/정산">수행/정산</button>
      <button type="button" class="stage-btn" data-stage="계약">계약</button>
    </div>
    <div class="row-body">
      <div class="grid2">
        <div class="field">
          <label>담당</label>
          <input type="text" data-field="owner" placeholder="이름을 입력하거나 아래에서 클릭">
          <div class="owner-chips" data-el="ownerChips"></div>
        </div>
        <div class="field">
          <label>사업명</label>
          <input type="text" data-field="project" placeholder="예: 2026년 AI챔피언 교육">
        </div>
      </div>
      <div class="grid2">
        <div class="field"><label>전주내용</label><textarea data-field="lastWeek" placeholder="지난주 완료한 업무"></textarea></div>
        <div class="field"><label>금주내용</label><textarea data-field="thisWeek" placeholder="이번주 진행할 업무"></textarea></div>
      </div>
      <div class="grid2">
        <div class="field">
          <div class="field-head">
            <label>사업기간</label>
            <span class="period-toggle" data-action="togglePeriodMode">직접 입력으로 전환</span>
          </div>
          <div class="period-range" data-el="periodCalendarWrap">
            <input type="date" data-field="periodStart">
            <span class="sep">~</span>
            <input type="date" data-field="periodEnd">
          </div>
          <input type="text" data-field="periodManual" placeholder="예: 2026.04~2026.12 또는 미정" class="hidden">
        </div>
        <div class="field">
          <label>매출(Vat별도)</label>
          <input type="text" data-field="revenue" placeholder="예: 50,000,000" inputmode="numeric">
        </div>
      </div>
    </div>
  </div>
</template>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzV2aacbgOpzp4uHYwR4WojeNfHW3NfvYJK4-XjXkWtGsIdgjU_e5MUMMLnfD-eWh6N8Q/exec';

const TEAMS = [
  { name: '컨설팅팀', icon: '<circle cx="12" cy="8" r="3.2"/><path d="M5 20c1.5-4 4.5-6 7-6s5.5 2 7 6"/>' },
  { name: '사업 1팀', icon: '<rect x="4" y="7" width="16" height="12" rx="2"/><path d="M9 7V5a2 2 0 012-2h2a2 2 0 012 2v2"/>' },
  { name: '사업 2팀', icon: '<rect x="4" y="7" width="16" height="12" rx="2"/><path d="M9 7V5a2 2 0 012-2h2a2 2 0 012 2v2"/>' },
  { name: '사업 3팀', icon: '<rect x="4" y="7" width="16" height="12" rx="2"/><path d="M9 7V5a2 2 0 012-2h2a2 2 0 012 2v2"/>' },
  { name: '사업 4팀', icon: '<rect x="4" y="7" width="16" height="12" rx="2"/><path d="M9 7V5a2 2 0 012-2h2a2 2 0 012 2v2"/>' },
  { name: '공공AI센터', icon: '<path d="M12 3l8 4v5c0 5-3.5 8-8 9-4.5-1-8-4-8-9V7z"/>' }
];

let currentTeam = null;
let currentMonday = mondayOf(new Date());
let members = [];

function mondayOf(d){
  const date = new Date(d);
  const day = date.getDay();
  const diff = (day === 0 ? -6 : 1) - day;
  date.setDate(date.getDate() + diff);
  date.setHours(0,0,0,0);
  return date;
}
function toISO(d){ return d.toISOString().slice(0,10); }
function weekOfMonthLabel(monday){
  const month = monday.getMonth()+1;
  const weekNum = Math.floor((monday.getDate()-1)/7)+1;
  const friday = new Date(monday); friday.setDate(monday.getDate()+4);
  const range = `${monday.getMonth()+1}/${monday.getDate()}~${friday.getMonth()+1}/${friday.getDate()}`;
  return { main: `${month}월 ${weekNum}주차`, sub: range };
}
function renderWeekLabel(){
  const { main, sub } = weekOfMonthLabel(currentMonday);
  document.getElementById('weekMain').textContent = main;
  document.getElementById('weekSub').textContent = sub;
}

// ---------- STEP 1: 팀 선택 ----------
const teamGrid = document.getElementById('teamGrid');
teamGrid.innerHTML = TEAMS.map(t => `
  <div class="team-pick-card" data-team="${t.name}">
    <div class="icon-wrap"><svg viewBox="0 0 24 24" style="stroke-width:1.8;fill:none;stroke:inherit">${t.icon}</svg></div>
    <div class="t-name">${t.name}</div>
  </div>
`).join('');
teamGrid.addEventListener('click', (e) => {
  const card = e.target.closest('.team-pick-card');
  if (!card) return;
  selectTeam(card.dataset.team);
});

async function selectTeam(team){
  currentTeam = team;
  document.getElementById('bannerTeam').textContent = team;
  document.getElementById('step1').classList.add('hidden');
  document.getElementById('step2').classList.remove('hidden');
  renderWeekLabel();
  if (!members.length) {
    try {
      const cfg = await fetch(`${API_URL}?action=config`).then(r => r.json());
      members = cfg.members || [];
    } catch (e) { members = []; }
  }
  if (!rowsEl.children.length) addRow();
}
document.getElementById('changeTeamBtn').addEventListener('click', () => {
  document.getElementById('step2').classList.add('hidden');
  document.getElementById('step1').classList.remove('hidden');
});

// ---------- 주차 이동 ----------
document.getElementById('prevWeek').addEventListener('click', () => {
  currentMonday.setDate(currentMonday.getDate()-7); renderWeekLabel();
});
document.getElementById('nextWeek').addEventListener('click', () => {
  currentMonday.setDate(currentMonday.getDate()+7); renderWeekLabel();
});

// ---------- 행 관리 ----------
const rowsEl = document.getElementById('rows');
const tpl = document.getElementById('rowTemplate');

function formatMoney(v){
  const digits = String(v).replace(/[^0-9]/g,'');
  if (!digits) return '';
  return Number(digits).toLocaleString('ko-KR');
}
function rawMoney(v){ return String(v).replace(/[^0-9]/g,''); }

function updateSummary(){
  const cards = [...rowsEl.querySelectorAll('.row-card')];
  document.getElementById('sumCount').textContent = cards.length;
  const total = cards.reduce((s, card) => s + (Number(rawMoney(card.querySelector('[data-field="revenue"]').value)) || 0), 0);
  document.getElementById('sumRevenue').textContent = Math.round(total/10000).toLocaleString('ko-KR');
}

function renderOwnerChips(card){
  const wrap = card.querySelector('[data-el="ownerChips"]');
  const list = members.filter(m => m.team === currentTeam);
  wrap.innerHTML = list.map(m => `<span class="owner-chip" data-name="${m.name}">${m.name}</span>`).join('');
}

function addRow(prefill){
  const node = tpl.content.cloneNode(true);
  rowsEl.appendChild(node);
  const card = rowsEl.lastElementChild;
  renderOwnerChips(card);

  if (prefill) {
    card.querySelector('[data-field="client"]').value = prefill.client || '';
    card.querySelector('[data-field="owner"]').value = prefill.owner || '';
    card.querySelector('[data-field="project"]').value = prefill.project || '';
    card.querySelector('[data-field="lastWeek"]').value = prefill.lastWeek || '';
    card.querySelector('[data-field="revenue"]').value = formatMoney(prefill.revenue || '');
    const manual = card.querySelector('[data-field="periodManual"]');
    manual.value = prefill.period || '';
    if (prefill.period) {
      manual.classList.remove('hidden');
      card.querySelector('[data-el="periodCalendarWrap"]').classList.add('hidden');
      card.querySelector('[data-action="togglePeriodMode"]').textContent = '달력으로 전환';
    }
    const group = card.querySelector('.stage-group');
    if (prefill.stage) {
      group.dataset.value = prefill.stage;
      const btn = group.querySelector(`[data-stage="${prefill.stage}"]`);
      if (btn) btn.classList.add('active');
    }
    if (prefill.continued) card.querySelector('[data-el="continuedTag"]').classList.remove('hidden');
  }
  updateSummary();
  return card;
}
document.getElementById('addRow').addEventListener('click', () => addRow());

rowsEl.addEventListener('click', (e) => {
  if (e.target.closest('[data-action="remove"]')) {
    e.target.closest('.row-card').remove();
    updateSummary();
  }
  const stageBtn = e.target.closest('.stage-btn');
  if (stageBtn) {
    const group = stageBtn.closest('.stage-group');
    group.querySelectorAll('.stage-btn').forEach(b => b.classList.remove('active'));
    stageBtn.classList.add('active');
    group.dataset.value = stageBtn.dataset.stage;
  }
  const ownerChip = e.target.closest('.owner-chip');
  if (ownerChip) {
    const card = ownerChip.closest('.row-card');
    const input = card.querySelector('[data-field="owner"]');
    const names = input.value.split(',').map(s => s.trim()).filter(Boolean);
    const name = ownerChip.dataset.name;
    if (names.includes(name)) {
      input.value = names.filter(n => n !== name).join(', ');
      ownerChip.classList.remove('selected');
    } else {
      names.push(name);
      input.value = names.join(', ');
      ownerChip.classList.add('selected');
    }
  }
  const toggle = e.target.closest('[data-action="togglePeriodMode"]');
  if (toggle) {
    const card = toggle.closest('.row-card');
    const cal = card.querySelector('[data-el="periodCalendarWrap"]');
    const manual = card.querySelector('[data-field="periodManual"]');
    const usingManual = !manual.classList.contains('hidden');
    if (usingManual) {
      manual.classList.add('hidden'); cal.classList.remove('hidden');
      toggle.textContent = '직접 입력으로 전환';
    } else {
      cal.classList.add('hidden'); manual.classList.remove('hidden');
      toggle.textContent = '달력으로 전환';
    }
  }
});

rowsEl.addEventListener('input', (e) => {
  if (e.target.dataset.field === 'revenue') {
    const caret = e.target.selectionStart;
    e.target.value = formatMoney(e.target.value);
    updateSummary();
  }
  if (e.target.dataset.field === 'periodStart' || e.target.dataset.field === 'periodEnd') {
    const card = e.target.closest('.row-card');
    const s = card.querySelector('[data-field="periodStart"]').value;
    const en = card.querySelector('[data-field="periodEnd"]').value;
  }
});

// ---------- 지난주 내용 불러오기 ----------
document.getElementById('loadPrevBtn').addEventListener('click', async () => {
  const prevMonday = new Date(currentMonday); prevMonday.setDate(prevMonday.getDate()-7);
  const week = toISO(prevMonday);
  const statusEl = document.getElementById('status');
  statusEl.textContent = '지난주 내용을 불러오는 중...'; statusEl.className = 'status';
  try {
    const data = await fetch(`${API_URL}?action=teamData&week=${week}`).then(r => r.json());
    const rows = data.filter(r => r.Team === currentTeam);
    if (!rows.length) {
      statusEl.textContent = '지난주에 이 팀이 입력한 내용이 없습니다.';
      statusEl.className = 'status err';
      return;
    }
    rowsEl.innerHTML = '';
    rows.forEach(r => addRow({
      client: r.Client, owner: r.Owner, project: r.Project, stage: r.Stage,
      lastWeek: r.ThisWeek, period: r.Period, revenue: r.Revenue, continued: true
    }));
    statusEl.textContent = `${rows.length}건 불러왔습니다. 금주내용을 채워주세요.`;
    statusEl.className = 'status ok';
  } catch (err) {
    statusEl.textContent = '불러오기 실패: ' + err.message;
    statusEl.className = 'status err';
  }
});

// ---------- 제출 ----------
document.getElementById('submitBtn').addEventListener('click', async () => {
  const statusEl = document.getElementById('status');
  const week = toISO(currentMonday);

  const rowCards = [...rowsEl.querySelectorAll('.row-card')];
  if (rowCards.length === 0) { statusEl.textContent = '최소 1개 이상의 항목을 입력해 주세요.'; statusEl.className = 'status err'; return; }

  const rows = rowCards.map(card => {
    const get = (f) => card.querySelector('[data-field="'+f+'"]').value.trim();
    const stageGroup = card.querySelector('.stage-group');
    const manual = card.querySelector('[data-field="periodManual"]');
    let period = manual.value.trim();
    if (!period) {
      const s = get('periodStart'), en = get('periodEnd');
      if (s && en) period = `${s.replace(/-/g,'.')}~${en.replace(/-/g,'.')}`;
    }
    return {
      client: get('client'), owner: get('owner'), project: get('project'),
      stage: stageGroup.dataset.value || '', lastWeek: get('lastWeek'), thisWeek: get('thisWeek'),
      period, revenue: rawMoney(get('revenue'))
    };
  }).filter(r => r.client || r.project);

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; statusEl.textContent = '제출 중...'; statusEl.className = 'status';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ type: 'team', team: currentTeam, week, rows })
    });
    const data = await res.json();
    if (data.ok) {
      statusEl.textContent = `제출 완료 (${data.count}건 저장됨)`;
      statusEl.className = 'status ok';
    } else {
      throw new Error(data.error || '알 수 없는 오류');
    }
  } catch (err) {
    statusEl.textContent = '제출 실패: ' + err.message;
    statusEl.className = 'status err';
  } finally {
    btn.disabled = false;
  }
});
</script>
</body>
</html>
