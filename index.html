<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주간 업무 보고</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --navy-900:#0b1830; --navy-800:#122142; --navy-700:#1b2d55; --navy-600:#2a3d6b;
    --line:#26365c; --text:#e7ebf5; --text-dim:#8f9bc0; --accent:#4f7fff; --accent-soft:#1d2c52;
    --good:#3ecf8e; --warn:#e8a33d; --danger:#e05a5a; --radius:10px;
    --stage-제안:#8f9bc0; --stage-협의:#e8a33d; --stage-수행:#4f7fff; --stage-종료:#3ecf8e;
    font-family:-apple-system,"Pretendard","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--navy-900); color:var(--text); min-height:100vh; }
  header{ background:var(--navy-800); border-bottom:1px solid var(--line); padding:16px 24px;
    display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
  header h1{ font-size:16px; font-weight:600; margin:0; }
  header .week{ font-size:12px; color:var(--text-dim); }
  nav{ display:flex; gap:4px; padding:0 24px; background:var(--navy-800); border-bottom:1px solid var(--line); }
  nav button{ background:none; border:none; color:var(--text-dim); padding:12px 16px; font-size:13px;
    cursor:pointer; border-bottom:2px solid transparent; font-weight:500; }
  nav button.active{ color:var(--text); border-bottom-color:var(--accent); }
  main{ padding:20px 24px 80px; max-width:1100px; margin:0 auto; }

  .toolbar{ display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
  select, input[type=text], input[type=number]{ background:var(--navy-700); border:1px solid var(--line);
    color:var(--text); padding:9px 12px; border-radius:var(--radius); font-size:13px; outline:none; }
  select:focus, input:focus{ border-color:var(--accent); }
  button.primary{ background:var(--accent); color:#fff; border:none; padding:9px 16px; border-radius:var(--radius);
    font-size:13px; font-weight:600; cursor:pointer; }
  button.ghost{ background:transparent; border:1px solid var(--line); color:var(--text); padding:9px 14px;
    border-radius:var(--radius); font-size:13px; cursor:pointer; }

  .card{ background:linear-gradient(180deg, var(--navy-800), var(--navy-800) 60%, var(--navy-700)); border:1px solid var(--line); border-radius:14px; padding:18px; margin-bottom:14px; box-shadow:0 2px 10px rgba(0,0,0,.15); }
  .card-head{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; gap:12px; flex-wrap:wrap; }
  .card-head .proj{ font-size:15px; font-weight:700; }
  .card-head .client{ font-size:12px; color:var(--text-dim); }
  .card-head .client::before{ content:"🏢 "; }
  .stage-tag{ display:inline-block; font-size:11px; padding:3px 10px; border-radius:20px; font-weight:600; color:#0b1830; }
  .field-label{ font-size:11px; color:var(--text-dim); margin:10px 0 4px; }
  textarea{ width:100%; background:var(--navy-700); border:1px solid var(--line); color:var(--text);
    border-radius:8px; padding:8px 10px; font-size:13px; resize:vertical; min-height:44px; font-family:inherit; }
  .row{ display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
  .row .col{ flex:1; min-width:110px; }
  .days{ display:flex; gap:6px; margin-top:10px; }
  .day-chip{ width:34px; height:34px; border-radius:8px; border:1px solid var(--line); background:var(--navy-700);
    color:var(--text-dim); font-size:12px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .day-chip.on{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .card-foot{ display:flex; justify-content:flex-end; margin-top:12px; gap:8px; align-items:center; }
  .saved-tag{ font-size:11px; color:var(--good); opacity:0; transition:opacity .3s; }
  .saved-tag.show{ opacity:1; }

  /* ===== 사업기간·매출 뱃지 ===== */
  .badge-row{ display:flex; gap:10px; margin-top:10px; flex-wrap:wrap; }
  .badge-field{ flex:1; min-width:150px; background:var(--navy-700); border:1px solid var(--line); border-radius:10px; padding:8px 12px; }
  .badge-field .badge-label{ font-size:10.5px; color:var(--text-dim); display:flex; align-items:center; gap:5px; margin-bottom:4px; }
  .badge-field input{ width:100%; background:none; border:none; color:var(--text); font-size:13px; padding:0; }
  .badge-field input:focus{ outline:none; }
  .badge-field.period .badge-label::before{ content:"📅"; }
  .badge-field.revenue .badge-label::before{ content:"💰"; }

  /* ===== 단계 선택 pill ===== */
  .stage-picker{ display:flex; gap:6px; margin-top:6px; flex-wrap:wrap; }
  .stage-pill{ padding:6px 14px; border-radius:20px; font-size:12.5px; font-weight:600; cursor:pointer;
    border:1.5px solid var(--line); background:var(--navy-700); color:var(--text-dim); }
  .stage-pill.on{ color:#0b1830; border-color:transparent; }

  /* ===== 담당 아바타 ===== */
  .owner-picker{ display:flex; flex-wrap:wrap; gap:8px; margin-top:6px; }
  .owner-chip{ display:flex; align-items:center; gap:6px; font-size:12px; padding:5px 12px 5px 5px; border-radius:20px;
    border:1.5px solid var(--line); background:var(--navy-700); color:var(--text-dim); cursor:pointer; }
  .owner-chip.on{ background:var(--accent-soft); border-color:var(--accent); color:var(--text); }
  .avatar{ width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:10px; font-weight:700; color:#fff; flex-shrink:0; }

  /* ===== 전주/금주/차주, 목표/결과/계획 타임라인 입력 박스 ===== */
  .flow{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-top:12px; position:relative; }
  .flow .flow-box{ border-radius:10px; padding:10px; border:1px solid var(--line); }
  .flow .flow-box:nth-child(1){ background:rgba(143,155,192,.08); }
  .flow .flow-box:nth-child(2){ background:rgba(79,127,255,.10); border-color:var(--accent); }
  .flow .flow-box:nth-child(3){ background:rgba(62,207,142,.08); }
  .flow .flow-label{ font-size:11px; font-weight:700; margin-bottom:6px; display:flex; align-items:center; gap:5px; }
  .flow textarea{ min-height:110px; background:transparent; border:none; padding:0; }
  .flow textarea:focus{ outline:none; }

  /* ===== 진행률 바 ===== */
  .progress-track{ width:100%; height:6px; background:var(--navy-700); border-radius:4px; margin-top:6px; overflow:hidden; }
  .progress-track .fill{ height:100%; background:var(--accent); border-radius:4px; }

  .empty{ text-align:center; color:var(--text-dim); font-size:13px; padding:60px 0; }

  /* ===== 보고서 뷰 ===== */
  .team-section{ margin-bottom:28px; }
  .team-header{ display:flex; justify-content:space-between; align-items:baseline; padding-bottom:8px;
    border-bottom:1px solid var(--line); margin-bottom:12px; }
  .team-header .name{ font-size:15px; font-weight:700; }
  .team-header .stat{ font-size:12px; color:var(--text-dim); }
  .report-card{ background:var(--navy-800); border:1px solid var(--line); border-radius:var(--radius); padding:14px 16px; margin-bottom:10px; }
  .report-card .top{ display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-bottom:10px; }
  .timeline{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
  .timeline .col{ background:var(--navy-700); border-radius:8px; padding:10px; font-size:12.5px; white-space:pre-line; }
  .timeline .col-label{ font-size:10.5px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.4px; margin-bottom:6px; }
  .report-foot{ display:flex; justify-content:space-between; font-size:11.5px; color:var(--text-dim); margin-top:10px; }

  .modal-bg{ position:fixed; inset:0; background:rgba(0,0,0,.5); display:flex; align-items:center; justify-content:center; z-index:100; }
  .modal{ background:var(--navy-800); border:1px solid var(--line); border-radius:var(--radius); padding:20px; width:400px; max-width:90vw; max-height:85vh; overflow:auto; }
  .modal h3{ margin:0 0 14px; font-size:14px; }
  .modal .actions{ display:flex; justify-content:flex-end; gap:8px; margin-top:18px; }
  .hidden{ display:none; }

  .ratio-row{ display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--line); }
  .ratio-row .name{ flex:1; font-size:12.5px; }
  .ratio-row input{ width:70px; text-align:right; }
  .ratio-total{ margin-top:12px; font-size:13px; text-align:right; }
  .ratio-total.bad{ color:var(--danger); }
  .ratio-total.good{ color:var(--good); }

  @media print{
    header, nav, .toolbar{ display:none !important; }
    body{ background:#fff; color:#111; }
    .report-card, .team-header{ break-inside:avoid; }
    .timeline .col{ background:#f2f2f2; color:#111; }
  }
</style>
</head>
<body>

<header>
  <h1>K-Brain 주간 업무 보고</h1>
  <span class="week" id="weekLabel">불러오는 중...</span>
</header>

<nav>
  <button class="active" data-view="team">팀 현황 입력</button>
  <button data-view="personal">개인 업무 입력</button>
  <button data-view="report">주간 보고서</button>
</nav>

<main>
  <!-- ===== 팀 현황 입력 (팀장) ===== -->
  <section id="view-team">
    <div class="toolbar">
      <select id="teamSelect"><option value="">팀을 선택하세요</option></select>
      <button class="ghost" id="addTeamTaskBtn">+ 신규 사업 추가</button>
    </div>
    <div id="teamTaskList"></div>
  </section>

  <!-- ===== 개인 업무 입력 (사원) ===== -->
  <section id="view-personal" class="hidden">
    <div class="toolbar">
      <select id="nameSelect"><option value="">이름을 선택하세요</option></select>
      <button class="ghost" id="addPersonalTaskBtn">+ 신규 업무 추가</button>
      <button class="ghost" id="openRatioBtn">업무비율 배분</button>
    </div>
    <div id="personalTaskList"></div>
  </section>

  <!-- ===== 주간 보고서 ===== -->
  <section id="view-report" class="hidden">
    <div class="toolbar">
      <button class="ghost" id="refreshReportBtn">새로고침</button>
      <button class="ghost" id="printReportBtn">인쇄 / PDF</button>
      <button class="primary" id="downloadReportBtn">엑셀 다운로드</button>
    </div>
    <div id="reportBody"></div>
  </section>
</main>

<!-- 신규 팀 사업 추가 모달 -->
<div class="modal-bg hidden" id="teamAddModal">
  <div class="modal">
    <h3>신규 사업 추가</h3>
    <div class="field-label">고객사</div>
    <input type="text" id="ta_client" style="width:100%">
    <div class="field-label">사업명</div>
    <input type="text" id="ta_project" style="width:100%">
    <div class="field-label">단계</div>
    <div class="stage-picker" id="ta_stage_picker"></div>
    <div class="field-label">담당</div>
    <div class="owner-picker" id="ta_owners"></div>
    <div class="field-label">금주내용</div>
    <textarea id="ta_current"></textarea>
    <div class="field-label">사업기간</div>
    <input type="text" id="ta_period" style="width:100%" placeholder="예: 2026.01~2026.12">
    <div class="field-label">매출(Vat별도)</div>
    <input type="text" id="ta_revenue" style="width:100%">
    <div class="actions">
      <button class="ghost" id="ta_cancel">취소</button>
      <button class="primary" id="ta_confirm">추가</button>
    </div>
  </div>
</div>

<!-- 신규 개인 업무 추가 모달 -->
<div class="modal-bg hidden" id="personalAddModal">
  <div class="modal">
    <h3>신규 업무 추가</h3>
    <div class="field-label">고객사</div>
    <input type="text" id="pa_client" style="width:100%">
    <div class="field-label">사업명</div>
    <input type="text" id="pa_project" style="width:100%">
    <div class="field-label">역할</div>
    <select id="pa_role" style="width:100%"></select>
    <div class="field-label">금주 추진목표</div>
    <textarea id="pa_goal"></textarea>
    <div class="field-label">사업종료일</div>
    <input type="text" id="pa_projectEnd" style="width:100%">
    <div class="actions">
      <button class="ghost" id="pa_cancel">취소</button>
      <button class="primary" id="pa_confirm">추가</button>
    </div>
  </div>
</div>

<!-- 업무비율 배분 모달 -->
<div class="modal-bg hidden" id="ratioModal">
  <div class="modal">
    <h3>이번 주 업무비율 배분</h3>
    <div id="ratioList"></div>
    <div class="ratio-total" id="ratioTotal">합계: 0%</div>
    <div class="actions">
      <button class="ghost" id="ratio_cancel">취소</button>
      <button class="primary" id="ratio_confirm">저장</button>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbw5dm2Kw9-sc9a3jWekjBVh1PObHIxECDl2tzLT6eTm5qF5yU0CeoUzpBBospfX3EM8hg/exec';

let teamData = [], personalData = [], names = [], teams = [], stages = [], roles = [], currentWeek = '';

async function apiGet(action){ const res = await fetch(`${API_URL}?action=${action}`); return res.json(); }
async function apiPost(payload){ const res = await fetch(API_URL, { method:'POST', body: JSON.stringify(payload) }); return res.json(); }

async function loadAll(){
  document.getElementById('teamTaskList').innerHTML = '<div class="empty">불러오는 중...</div>';
  try{
    const data = await apiGet('getAll');
    if(!data.ok) throw new Error(data.error);
    teamData = data.team; personalData = data.personal;
    names = data.names; teams = data.teams; stages = data.stages; roles = data.roles;
    currentWeek = data.week;
    document.getElementById('weekLabel').textContent = currentWeek;
    populateSelects();
    renderTeamList(); renderPersonalList(); renderReport();
  }catch(err){
    document.getElementById('teamTaskList').innerHTML =
      `<div class="empty">데이터를 불러오지 못했습니다.<br>${err.message}</div>`;
  }
}

function populateSelects(){
  document.getElementById('teamSelect').innerHTML = '<option value="">팀을 선택하세요</option>' +
    teams.map(t=>`<option value="${t}">${t}</option>`).join('');
  document.getElementById('nameSelect').innerHTML = '<option value="">이름을 선택하세요</option>' +
    names.map(n=>`<option value="${n}">${n}</option>`).join('');
  document.getElementById('pa_role').innerHTML = roles.map(r=>`<option>${r}</option>`).join('');
  document.getElementById('ta_stage_picker').innerHTML = stagePillsHtml(stages[0]);
  bindStagePicker(document.getElementById('ta_stage_picker'));
  document.getElementById('ta_owners').innerHTML = ownerChipsHtml(names, '');
  document.querySelectorAll('#ta_owners .owner-chip').forEach(chip=>{
    chip.addEventListener('click', ()=> chip.classList.toggle('on'));
  });
}

function stageColor(stage){ return `var(--stage-${stage||'제안'}, var(--accent))`; }

function initials(name){ return (name||'?').trim().slice(-2); }
function colorForName(name){
  let hash = 0;
  for(let i=0;i<(name||'').length;i++) hash = name.charCodeAt(i) + ((hash<<5)-hash);
  const hue = Math.abs(hash) % 360;
  return `hsl(${hue}, 55%, 45%)`;
}
function avatarHtml(name){
  return `<span class="avatar" style="background:${colorForName(name)}">${initials(name)}</span>`;
}
function ownerChipsHtml(containerNames, selectedNames){
  const selected = (selectedNames||'').split(',').map(s=>s.trim()).filter(Boolean);
  return containerNames.map(n=>`
    <div class="owner-chip ${selected.includes(n)?'on':''}" data-name="${n}">${avatarHtml(n)}<span>${n}</span></div>
  `).join('');
}
function stagePillsHtml(selected){
  return stages.map(s=>`<div class="stage-pill ${s===selected?'on':''}" data-stage="${s}"
    style="${s===selected?`background:${stageColor(s)};border-color:${stageColor(s)}`:''}">${s}</div>`).join('');
}
function bindStagePicker(container){
  container.querySelectorAll('.stage-pill').forEach(pill=>{
    pill.addEventListener('click', ()=>{
      container.querySelectorAll('.stage-pill').forEach(p=>{ p.classList.remove('on'); p.style.background=''; p.style.borderColor=''; });
      pill.classList.add('on');
      pill.style.background = stageColor(pill.dataset.stage);
      pill.style.borderColor = stageColor(pill.dataset.stage);
    });
  });
}

// ===================== 팀 현황 입력 =====================
function renderTeamList(){
  const team = document.getElementById('teamSelect').value;
  const list = document.getElementById('teamTaskList');
  if(!team){ list.innerHTML = '<div class="empty">팀을 선택하면 해당 팀의 사업 목록이 표시됩니다.</div>'; return; }
  const rows = teamData.filter(r => r.team === team);
  if(rows.length === 0){ list.innerHTML = '<div class="empty">등록된 사업이 없습니다. 신규 사업을 추가해보세요.</div>'; return; }

  list.innerHTML = rows.map(t => `
    <div class="card" data-row="${t.rowNum}">
      <div class="card-head">
        <div><span class="proj">${t.project||''}</span></div>
        <div class="client">${t.client||''}</div>
      </div>

      <div class="field-label">단계</div>
      <div class="stage-picker">${stagePillsHtml(t.stage)}</div>

      <div class="field-label">담당</div>
      <div class="owner-picker">${ownerChipsHtml(names, t.owner)}</div>

      <div class="flow">
        <div class="flow-box"><div class="flow-label">🗂️ 전주내용</div><textarea class="f-prev">${t.prev||''}</textarea></div>
        <div class="flow-box"><div class="flow-label">▶ 금주내용</div><textarea class="f-current">${t.current||''}</textarea></div>
        <div class="flow-box"><div class="flow-label">🔜 차주내용</div><textarea class="f-next">${t.next||''}</textarea></div>
      </div>

      <div class="badge-row">
        <div class="badge-field period"><div class="badge-label">사업기간</div><input type="text" class="f-period" value="${t.period||''}"></div>
        <div class="badge-field revenue"><div class="badge-label">매출(Vat별도)</div><input type="text" class="f-revenue" value="${t.revenue||''}"></div>
      </div>

      <div class="card-foot">
        <span class="saved-tag">저장됨</span>
        <button class="primary save-btn">저장</button>
      </div>
    </div>
  `).join('');

  rows.forEach(t => { bindStagePicker(document.querySelector(`#teamTaskList .card[data-row="${t.rowNum}"] .stage-picker`)); bindTeamCard(t, team); });
}

function bindTeamCard(t, team){
  const card = document.querySelector(`#teamTaskList .card[data-row="${t.rowNum}"]`);
  card.querySelectorAll('.owner-chip').forEach(chip=> chip.addEventListener('click', ()=> chip.classList.toggle('on')));

  card.querySelector('.save-btn').addEventListener('click', async ()=>{
    const owners = [...card.querySelectorAll('.owner-chip.on')].map(c=>c.dataset.name).join(', ');
    const stagePill = card.querySelector('.stage-pill.on');
    const payload = {
      action:'updateTeamRow', rowNum: t.rowNum, team,
      stage: stagePill ? stagePill.dataset.stage : t.stage,
      period: card.querySelector('.f-period').value,
      revenue: card.querySelector('.f-revenue').value,
      owner: owners,
      prev: card.querySelector('.f-prev').value,
      current: card.querySelector('.f-current').value,
      next: card.querySelector('.f-next').value
    };
    const btn = card.querySelector('.save-btn'); btn.disabled = true; btn.textContent = '저장 중...';
    const res = await apiPost(payload);
    btn.disabled = false; btn.textContent = '저장';
    if(res.ok){
      const tag = card.querySelector('.saved-tag'); tag.classList.add('show');
      setTimeout(()=>tag.classList.remove('show'), 1500);
    } else alert('저장 실패: ' + res.error);
  });
}

document.getElementById('teamSelect').addEventListener('change', renderTeamList);

document.getElementById('addTeamTaskBtn').addEventListener('click', ()=>{
  if(!document.getElementById('teamSelect').value){ alert('먼저 팀을 선택하세요'); return; }
  document.querySelectorAll('#ta_owners .owner-chip').forEach(c=>c.classList.remove('on'));
  document.getElementById('ta_stage_picker').innerHTML = stagePillsHtml(stages[0]);
  bindStagePicker(document.getElementById('ta_stage_picker'));
  document.getElementById('teamAddModal').classList.remove('hidden');
});
document.getElementById('ta_cancel').addEventListener('click', ()=> document.getElementById('teamAddModal').classList.add('hidden'));
document.getElementById('ta_confirm').addEventListener('click', async ()=>{
  const team = document.getElementById('teamSelect').value;
  const owners = [...document.querySelectorAll('#ta_owners .owner-chip.on')].map(c=>c.dataset.name).join(', ');
  const payload = {
    action:'addTeamRow', team,
    client: document.getElementById('ta_client').value,
    project: document.getElementById('ta_project').value,
    stage: (document.querySelector('#ta_stage_picker .stage-pill.on')||{}).dataset?.stage || stages[0],
    owner: owners,
    current: document.getElementById('ta_current').value,
    period: document.getElementById('ta_period').value,
    revenue: document.getElementById('ta_revenue').value
  };
  const res = await apiPost(payload);
  if(res.ok){ document.getElementById('teamAddModal').classList.add('hidden'); await loadAll(); document.getElementById('teamSelect').value = team; renderTeamList(); }
  else alert('추가 실패: ' + res.error);
});

function progressPercent(v){
  const n = parseFloat(v);
  if(isNaN(n)) return 0;
  const pct = Math.abs(n) <= 1 ? n * 100 : n;
  return Math.max(0, Math.min(100, pct));
}

// ===================== 개인 업무 입력 =====================
function renderPersonalList(){
  const name = document.getElementById('nameSelect').value;
  const list = document.getElementById('personalTaskList');
  if(!name){ list.innerHTML = '<div class="empty">이름을 선택하면 내 업무 목록이 표시됩니다.</div>'; return; }
  const rows = personalData.filter(r => r.name === name);
  if(rows.length === 0){ list.innerHTML = '<div class="empty">등록된 업무가 없습니다. 신규 업무를 추가해보세요.</div>'; return; }

  list.innerHTML = rows.map(t => `
    <div class="card" data-row="${t.rowNum}">
      <div class="card-head">
        <div><span class="proj">${t.project||''}</span></div>
        <div class="client">${t.client||''}</div>
      </div>
      <div class="field-label">역할</div>
      <select class="f-role" style="width:160px">${roles.map(r=>`<option ${r===t.role?'selected':''}>${r}</option>`).join('')}</select>

      <div class="flow">
        <div class="flow-box"><div class="flow-label">🎯 금주 추진목표</div><textarea class="f-goal">${t.goal||''}</textarea></div>
        <div class="flow-box"><div class="flow-label">✅ 금주 추진결과</div><textarea class="f-result" placeholder="이번 주 실제 진행한 내용">${t.result||''}</textarea></div>
        <div class="flow-box"><div class="flow-label">🔜 차주 업무계획</div><textarea class="f-next" placeholder="다음 주 계획">${t.next||''}</textarea></div>
      </div>

      <div class="row">
        <div class="col"><div class="field-label">업무종료일</div><input type="text" class="f-taskend" style="width:100%" value="${t.taskEnd||''}"></div>
        <div class="col"><div class="field-label">사업종료일</div><input type="text" class="f-projectend" style="width:100%" value="${t.projectEnd||''}"></div>
        <div class="col">
          <div class="field-label">누적진행률(%)</div>
          <input type="text" class="f-progress" style="width:100%" value="${t.progress||''}">
          <div class="progress-track"><div class="fill" style="width:${progressPercent(t.progress)}%"></div></div>
        </div>
        <div class="col"><div class="field-label">업무난이도</div><select class="f-difficulty" style="width:100%">
          <option ${t.difficulty==='상'?'selected':''}>상</option><option ${t.difficulty==='중'?'selected':''}>중</option><option ${t.difficulty==='하'?'selected':''}>하</option>
        </select></div>
      </div>

      <div class="field-label">업무 요일</div>
      <div class="days">
        ${['mon','tue','wed','thu','fri'].map((d,i)=>{
          const label=['월','화','수','목','금'][i]; const on = t.days && t.days[d];
          return `<div class="day-chip ${on?'on':''}" data-day="${d}">${label}</div>`;
        }).join('')}
      </div>
      <div class="card-foot">
        <span class="saved-tag">저장됨</span>
        <button class="primary save-btn">저장</button>
      </div>
    </div>
  `).join('');

  rows.forEach(t => bindPersonalCard(t));
}

function bindPersonalCard(t){
  const card = document.querySelector(`#personalTaskList .card[data-row="${t.rowNum}"]`);
  card.querySelectorAll('.day-chip').forEach(chip=> chip.addEventListener('click', ()=> chip.classList.toggle('on')));
  card.querySelector('.save-btn').addEventListener('click', async ()=>{
    const days = {};
    card.querySelectorAll('.day-chip').forEach(chip=>{ days[chip.dataset.day] = chip.classList.contains('on'); });
    const payload = {
      action:'updatePersonalRow', rowNum: t.rowNum,
      goal: card.querySelector('.f-goal').value,
      result: card.querySelector('.f-result').value,
      next: card.querySelector('.f-next').value,
      taskEnd: card.querySelector('.f-taskend').value,
      progress: card.querySelector('.f-progress').value,
      difficulty: card.querySelector('.f-difficulty').value,
      days
    };
    const btn = card.querySelector('.save-btn'); btn.disabled = true; btn.textContent = '저장 중...';
    const res = await apiPost(payload);
    btn.disabled = false; btn.textContent = '저장';
    if(res.ok){ const tag = card.querySelector('.saved-tag'); tag.classList.add('show'); setTimeout(()=>tag.classList.remove('show'),1500); }
    else alert('저장 실패: ' + res.error);
  });
}

document.getElementById('nameSelect').addEventListener('change', renderPersonalList);

document.getElementById('addPersonalTaskBtn').addEventListener('click', ()=>{
  if(!document.getElementById('nameSelect').value){ alert('먼저 이름을 선택하세요'); return; }
  document.getElementById('personalAddModal').classList.remove('hidden');
});
document.getElementById('pa_cancel').addEventListener('click', ()=> document.getElementById('personalAddModal').classList.add('hidden'));
document.getElementById('pa_confirm').addEventListener('click', async ()=>{
  const name = document.getElementById('nameSelect').value;
  const dept = (personalData.find(r=>r.name===name)||{}).dept || '';
  const payload = {
    action:'addPersonalRow', dept, name,
    client: document.getElementById('pa_client').value,
    project: document.getElementById('pa_project').value,
    role: document.getElementById('pa_role').value,
    goal: document.getElementById('pa_goal').value,
    projectEnd: document.getElementById('pa_projectEnd').value
  };
  const res = await apiPost(payload);
  if(res.ok){ document.getElementById('personalAddModal').classList.add('hidden'); await loadAll(); document.getElementById('nameSelect').value = name; renderPersonalList(); }
  else alert('추가 실패: ' + res.error);
});

// ===== 업무비율 일괄 배분 =====
document.getElementById('openRatioBtn').addEventListener('click', ()=>{
  const name = document.getElementById('nameSelect').value;
  if(!name){ alert('먼저 이름을 선택하세요'); return; }
  const rows = personalData.filter(r => r.name === name);
  if(rows.length === 0){ alert('등록된 업무가 없습니다'); return; }
  const listEl = document.getElementById('ratioList');
  listEl.innerHTML = rows.map(r => `
    <div class="ratio-row" data-row="${r.rowNum}">
      <div class="name">${r.project||''} <span style="color:var(--text-dim)">(${r.client||''})</span></div>
      <input type="number" class="ratio-input" min="0" max="100" value="${r.ratio||0}"> %
    </div>`).join('');
  updateRatioTotal();
  listEl.querySelectorAll('.ratio-input').forEach(inp => inp.addEventListener('input', updateRatioTotal));
  document.getElementById('ratioModal').classList.remove('hidden');
});
function updateRatioTotal(){
  const inputs = [...document.querySelectorAll('#ratioList .ratio-input')];
  const total = inputs.reduce((s,i)=> s + (parseFloat(i.value)||0), 0);
  const el = document.getElementById('ratioTotal');
  el.textContent = `합계: ${total}%`;
  el.className = 'ratio-total ' + (total === 100 ? 'good' : 'bad');
}
document.getElementById('ratio_cancel').addEventListener('click', ()=> document.getElementById('ratioModal').classList.add('hidden'));
document.getElementById('ratio_confirm').addEventListener('click', async ()=>{
  const rows = [...document.querySelectorAll('#ratioList .ratio-row')].map(row => ({
    rowNum: Number(row.dataset.row), ratio: parseFloat(row.querySelector('.ratio-input').value) || 0
  }));
  const total = rows.reduce((s,r)=>s+r.ratio,0);
  if(total !== 100 && !confirm(`합계가 ${total}%입니다. 100%가 아니어도 저장할까요?`)) return;
  const res = await apiPost({ action:'setPersonalRatios', ratios: rows });
  if(res.ok){ document.getElementById('ratioModal').classList.add('hidden'); await loadAll(); document.getElementById('nameSelect').value = document.getElementById('nameSelect').value; renderPersonalList(); }
  else alert('저장 실패: ' + res.error);
});

// ===================== 주간 보고서 =====================
function parseRevenue(v){
  if(v === undefined || v === null || v === '') return 0;
  const n = String(v).replace(/[^0-9.-]/g, '');
  return n ? parseFloat(n) : 0;
}
function renderReport(){
  const body = document.getElementById('reportBody');
  if(teamData.length === 0){ body.innerHTML = '<div class="empty">이번 주 팀 현황 데이터가 없습니다.</div>'; return; }

  const byTeam = {};
  teamData.forEach(r=>{ const k = r.team || '미분류'; (byTeam[k]=byTeam[k]||[]).push(r); });

  body.innerHTML = Object.entries(byTeam).map(([team, rows])=>{
    const totalRevenue = rows.reduce((s,r)=> s + parseRevenue(r.revenue), 0);
    return `
    <div class="team-section">
      <div class="team-header">
        <span class="name">${team}</span>
        <span class="stat">사업 ${rows.length}건 · 매출 합계 ${totalRevenue.toLocaleString()}원</span>
      </div>
      ${rows.map(r => `
        <div class="report-card">
          <div class="top">
            <div><b>${r.project||''}</b> <span style="color:var(--text-dim);font-size:12px">${r.client||''}</span></div>
            <div>
              <span class="stage-tag" style="background:${stageColor(r.stage)}">${r.stage||'-'}</span>
              <span style="font-size:11.5px;color:var(--text-dim);margin-left:8px">${r.owner||''}</span>
            </div>
          </div>
          <div class="timeline">
            <div class="col"><div class="col-label">🗂️ 전주</div>${r.prev||'-'}</div>
            <div class="col"><div class="col-label">▶ 금주</div>${r.current||'-'}</div>
            <div class="col"><div class="col-label">🔜 차주</div>${r.next||'-'}</div>
          </div>
          <div class="report-foot">
            <span>📅 ${r.period||''}</span>
            <span>💰 ${r.revenue||''}</span>
          </div>
        </div>
      `).join('')}
    </div>`;
  }).join('');
}

document.getElementById('refreshReportBtn').addEventListener('click', loadAll);
document.getElementById('printReportBtn').addEventListener('click', ()=> window.print());
document.getElementById('downloadReportBtn').addEventListener('click', ()=>{
  const rows = [['팀','고객사','사업명','단계','담당','전주내용','금주내용','차주내용','사업기간','매출']]
    .concat(teamData.map(r=>[r.team,r.client,r.project,r.stage,r.owner,r.prev,r.current,r.next,r.period,r.revenue]));
  const ws = XLSX.utils.aoa_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '주간보고');
  XLSX.writeFile(wb, `주간보고_${currentWeek||''}.xlsx`);
});

// ===================== 네비게이션 =====================
document.querySelectorAll('nav button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const view = btn.dataset.view;
    document.getElementById('view-team').classList.toggle('hidden', view!=='team');
    document.getElementById('view-personal').classList.toggle('hidden', view!=='personal');
    document.getElementById('view-report').classList.toggle('hidden', view!=='report');
  });
});

loadAll();
</script>
